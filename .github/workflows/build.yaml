name: Build Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v**" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          cache: 'gradle'
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle to generate and submit dependency graphs
        uses: gradle/actions/setup-gradle@v6
        with:
          dependency-graph: generate-and-submit
      - name: Build with Gradle
        run: ./gradlew build aggregateTestCodeCoverageReport sonar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Set Docker tag
        id: tag
        run: |
          REF_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          TAG=$(echo "$REF_NAME" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Build Docker image
        run: docker build -t ghcr.io/osgp/protocol-adapter-oslp-mikronika:${{ steps.tag.outputs.tag }} .
      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Docker image
        if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
        run: docker push ghcr.io/osgp/protocol-adapter-oslp-mikronika:${{ steps.tag.outputs.tag }}
